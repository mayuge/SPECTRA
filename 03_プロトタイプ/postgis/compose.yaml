version: "3.8"

services:
  postgis:
    image: kartoza/postgis:12.4
    environment:
      - POSTGRES_USER=docker
      - POSTGRES_PASSWORD=docker
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgis-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgtileserv:
    image: pramsey/pg_tileserv
    ports:
      - "7800:7800"
    environment:
      - DATABASE_URL=postgres://docker:docker@postgis:5432/postgres
    depends_on:
      - postgis

  pgfeatureserv:
    image: pramsey/pg_featureserv
    ports:
      - "9000:9000"
    environment:
      - DATABASE_URL=postgres://docker:docker@postgis:5432/postgres
    depends_on:
      - postgis

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - postgis
    environment:
      - NODE_ENV=development

volumes:
  postgis-data:
