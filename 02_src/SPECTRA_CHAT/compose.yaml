services:
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run --token ${CLOUDFLARED_TOKEN}
    environment:
      - CLOUDFLARED_TOKEN=${CLOUDFLARED_TOKEN}
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
    depends_on:
      - frontend
      - backend
  postgis:
    image: postgis/postgis:18-3.6
    container_name: postgis_container
    environment:
      - POSTGRES_USER=docker
      - POSTGRES_PASSWORD=docker
      - POSTGRES_DB=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgis-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docker -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: backend_container
    working_dir: /backend
    volumes:
      - ./backend:/backend
    command:
      [
        "uv",
        "run",
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "4000",
      ]
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      - PGUSER=docker
      - PGPASSWORD=docker
      - PGHOST=postgis
      - PGDATABASE=postgres
      - PGPORT=5432
    depends_on:
      postgis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: frontend_container
    ports:
      - "3000:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
    restart: unless-stopped

volumes:
  postgis-data:
    driver: local
